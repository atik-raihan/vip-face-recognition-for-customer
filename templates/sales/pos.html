{% extends "base.html" %}

{% block content %}

<div class="container-fluid">

    <div class="card">

        <div class="card-header bg-primary text-white">
            <h3>Point of Sale (POS)</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="row mb-3">

                    <div class="col-md-6">

                        <label>Customer</label>

                        <select
                            name="customer"
                            id="customer"
                            class="form-control">

                            {% for customer in customers %}

                            <option value="{{ customer.id }}">
                                {{ customer.name }} - {{ customer.phone }}
                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="col-md-4">

                        <label>Product</label>

                        <select
                            id="product"
                            class="form-control">

                            <option value="">Select Product</option>

                            {% for product in products %}

                            <option value="{{ product.id }}">
                                {{ product.name }} - ৳{{ product.price }}
                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="col-md-2">

                        <label>&nbsp;</label>

                        <button
                            type="button"
                            onclick="addProduct()"
                            class="btn btn-success w-100">

                            Add

                        </button>

                    </div>

                </div>

                <input
                    type="hidden"
                    name="items"
                    id="items">

                <table class="table table-bordered">

                    <thead>

                        <tr>

                            <th>Product</th>
                            <th>Price</th>
                            <th width="180">Quantity</th>
                            <th>Subtotal</th>
                            <th width="120">Action</th>

                        </tr>

                    </thead>

                    <tbody id="cart">

                    </tbody>

                </table>

                <h3 class="text-end">

                    Total:
                    ৳<span id="total">0.00</span>

                </h3>

                <button class="btn btn-primary">

                    Complete Sale

                </button>

            </form>

        </div>

    </div>

</div>

<script>

let cart = [];

function renderCart(){

    let html = "";
    let total = 0;

    cart.forEach((item,index)=>{

        let subtotal = item.price * item.qty;

        total += subtotal;

        html += `
        <tr>

            <td>${item.name}</td>

            <td>৳${item.price.toFixed(2)}</td>

            <td>

                <button
                    type="button"
                    class="btn btn-danger btn-sm"
                    onclick="decrease(${index})">

                    -

                </button>

                <span class="mx-2">${item.qty}</span>

                <button
                    type="button"
                    class="btn btn-success btn-sm"
                    onclick="increase(${index})">

                    +

                </button>

            </td>

            <td>৳${subtotal.toFixed(2)}</td>

            <td>

                <button
                    type="button"
                    class="btn btn-danger btn-sm"
                    onclick="removeItem(${index})">

                    Remove

                </button>

            </td>

        </tr>
        `;

    });

    document.getElementById("cart").innerHTML = html;

    document.getElementById("total").innerHTML = total.toFixed(2);

    document.getElementById("items").value = JSON.stringify(

        cart.map(item => ({
            id: item.id,
            qty: item.qty
        }))

    );

}

function addProduct(){

    let id = document.getElementById("product").value;

    if(id=="") return;

    fetch("/pos/product/?id="+id)

    .then(response => response.json())

    .then(data => {

        let existing = cart.find(item => item.id == data.id);

        if(existing){

            if(existing.qty < data.stock){

                existing.qty++;

            }else{

                alert("Not enough stock!");

            }

        }else{

            cart.push({

                id: data.id,
                name: data.name,
                price: data.price,
                qty: 1,
                stock: data.stock

            });

        }

        renderCart();

    });

}

function increase(index){

    if(cart[index].qty < cart[index].stock){

        cart[index].qty++;

        renderCart();

    }else{

        alert("Stock limit reached!");

    }

}

function decrease(index){

    cart[index].qty--;

    if(cart[index].qty <= 0){

        cart.splice(index,1);

    }

    renderCart();

}

function removeItem(index){

    cart.splice(index,1);

    renderCart();

}

</script>


<!-- ============================================================ -->
<!-- AI RECOGNITION: Welcome Back modal + auto-select customer     -->
<!-- ============================================================ -->

<div id="welcome-back-modal" style="
    display:none;
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.6); z-index:9999;
    align-items:center; justify-content:center;">
  <div style="
      background:#fff; border-radius:10px; padding:30px 40px;
      max-width:420px; width:90%; text-align:center;
      box-shadow:0 10px 40px rgba(0,0,0,0.3);">
    <h2 style="margin:0 0 10px;">WELCOME BACK</h2>
    <h3 id="wb-customer-name" style="margin:0 0 10px; color:#333;"></h3>
    <div id="wb-vip-badge" style="
        display:none; color:#b8860b; font-weight:bold; margin-bottom:10px;">
      ⭐ VIP CUSTOMER
    </div>
    <p style="margin:0 0 20px; color:#555;">
      Total Purchase:<br>
      <strong id="wb-total-purchase" style="font-size:1.3em;"></strong> BDT
    </p>
    <button onclick="closeWelcomeBackModal()" style="
        background:#28a745; color:#fff; border:none; padding:10px 24px;
        border-radius:6px; cursor:pointer; font-size:1em;">
      Continue
    </button>
  </div>
</div>

<script>
(function () {
  // Matches this file's actual dropdown: <select id="customer" name="customer">
  const CUSTOMER_SELECT_ID = "customer";

  // Matches root urls.py: path("camera/", include("face_recognition_app.urls"))
  const LATEST_RECOGNITION_URL = "/camera/latest-recognition/";

  const POLL_INTERVAL_MS = 3000;
  let lastSeenLogId = null;

  function showWelcomeBackModal(data) {
    document.getElementById("wb-customer-name").textContent = data.customer_name;
    document.getElementById("wb-total-purchase").textContent =
      Number(data.total_purchase).toLocaleString();
    document.getElementById("wb-vip-badge").style.display =
      data.is_vip ? "block" : "none";
    document.getElementById("welcome-back-modal").style.display = "flex";
  }

  window.closeWelcomeBackModal = function () {
    document.getElementById("welcome-back-modal").style.display = "none";
  };

  function autoSelectCustomer(customerId) {
    const select = document.getElementById(CUSTOMER_SELECT_ID);
    if (!select) return;
    select.value = String(customerId);
    select.dispatchEvent(new Event("change", { bubbles: true }));
  }

  async function pollRecognition() {
    try {
      const url = new URL(LATEST_RECOGNITION_URL, window.location.origin);
      if (lastSeenLogId) url.searchParams.set("since_id", lastSeenLogId);

      const response = await fetch(url);
      if (!response.ok) return;

      const data = await response.json();
      if (data.new) {
        lastSeenLogId = data.log_id;
        autoSelectCustomer(data.customer_id);
        showWelcomeBackModal(data);
      }
    } catch (err) {
      console.debug("Recognition poll failed:", err);
    }
  }

  setInterval(pollRecognition, POLL_INTERVAL_MS);
})();
</script>

{% endblock %}
