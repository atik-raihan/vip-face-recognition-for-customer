  WHAT IT DOES:
  - Polls /face-recognition/latest-recognition/ every 3 seconds
    (adjust the URL prefix below to match your actual urls.py include path)

    name, VIP badge, and total purchase
  - Auto-selects that customer in your POS customer dropdown, IF your
    dropdown's <select> has id="customer-select" and its <option> values
    are the customer's database ID (adjust CUSTOMER_SELECT_ID below if
    your POS form uses a different id/name).

  actual POS page's field names.
