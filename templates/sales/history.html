{% extends "base.html" %}

{% block content %}

<div class="container-fluid">

<div class="card">

<div class="card-header bg-success text-white">

<h3>Sales History</h3>

</div>

<div class="card-body">

<table class="table table-bordered table-hover">

<thead>

<tr>

<th>#</th>
<th>Customer</th>
<th>Total</th>
<th>Date</th>
<th width="120">Action</th>

</tr>

</thead>

<tbody>

{% for sale in sales %}

<tr>

<td>{{ sale.id }}</td>

<td>

{{ sale.customer.name }}

</td>

<td>

৳{{ sale.total }}

</td>

<td>

{{ sale.created_at }}

</td>

<td>

<a
href="{% url 'sale_detail' sale.id %}"
class="btn btn-primary btn-sm">

View

</a>

</td>

</tr>

{% empty %}

<tr>

<td colspan="5">

No sales found.

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

{% endblock %}
