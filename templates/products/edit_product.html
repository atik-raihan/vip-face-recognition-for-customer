{% extends "base.html" %}

{% block content %}

<div class="container-fluid">

<div class="card">

<div class="card-header">

<h3>Edit Product</h3>

</div>

<div class="card-body">

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

{{ form.as_p }}

<button class="btn btn-success">

Update Product

</button>

<a href="{% url 'product_list' %}"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

{% endblock %}
